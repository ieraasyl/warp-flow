name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package plugin zip
        run: |
          PKG="Flow.Launcher.Plugin.WARP"
          STAGING="staging/${PKG}"
          mkdir -p "${STAGING}/Images"
          cp main.js commands.js warp.js "${STAGING}/"
          cp Flow.Launcher.Plugin.WARP/plugin.json Flow.Launcher.Plugin.WARP/SettingsTemplate.yaml "${STAGING}/"
          cp Images/*.png "${STAGING}/Images/"
          cd staging
          zip -r "../${PKG}.zip" "${PKG}"

      - uses: softprops/action-gh-release@v2
        with:
          files: Flow.Launcher.Plugin.WARP.zip
          generate_release_notes: true
